services:
  redis:
    image: redis/redis-stack:latest
    container_name: engine-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "${REDIS_PORT:-6379}:6379"
      - "${REDIS_UI_PORT:-8001}:8001"

  ingestor:
    build:
      context: ./ingestor
    container_name: engine-ingestor
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SYMBOLS: BTCUSDT
      INTERVAL: 60
      DATA_SOURCE: binance
      WS_URI: wss://stream.binance.com/ws
      BINANCE_KLINE_INTERVAL: 1s
      WS_CONNECT_TIMEOUT: 10
      LOG_LEVEL: INFO

  strategy:
    build:
      context: ./strategy
    container_name: engine-strategy
    depends_on:
      ingestor:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SYMBOLS: BTCUSDT
      STRATEGY_MODULE: ema_crossover
      STREAM_START_ID: $$
      LOG_LEVEL: INFO

  timeseries:
    build:
      context: ./timeseries
    container_name: engine-timeseries
    depends_on:
      strategy:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SYMBOLS: BTCUSDT
      STRATEGIES: ema_crossover
      STREAM_START_ID: $$
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  alerts:
    build:
      context: ./alerts
    container_name: engine-alerts
    depends_on:
      strategy:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STRATEGIES: ema_crossover
      SYMBOLS: BTCUSDT
      STREAM_START_ID: $$
      ALERT_CHANNEL: default
      DEDUP_WINDOW: 1
      LOG_LEVEL: INFO

  pubsub:
    build:
      context: ./pubsub
    container_name: engine-pubsub
    profiles:
      - optional

  grafana:
    image: grafana/grafana
    container_name: engine-grafana
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  grafana_data:
